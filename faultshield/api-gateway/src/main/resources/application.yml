server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: job-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/jobs/**
        - id: scheduler-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/scheduler/**
        - id: worker-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/workers/**

logging:
  level:
    com.faultshield: DEBUG